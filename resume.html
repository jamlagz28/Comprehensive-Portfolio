<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Resume | James Laag</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f5f5;
}

.header{
background:#0f172a;
color:white;
text-align:center;
padding:60px 20px;
}

.resume-container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.resume-section{
margin-bottom:40px;
}

.resume-section h2{
margin-bottom:15px;
color:#1e293b;
border-bottom:2px solid #38bdf8;
display:inline-block;
padding-bottom:5px;
}

.resume-item{
margin-bottom:15px;
}

.resume-item h3{
font-size:18px;
margin-bottom:5px;
}

.resume-item p{
color:#555;
font-size:15px;
}

.pdf-viewer{
width:100%;
height:700px;
border:1px solid #ddd;
margin-top:20px;
}

.download-btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#38bdf8;
color:white;
text-decoration:none;
border-radius:6px;
}

.download-btn:hover{
background:#0284c7;
}

.footer{
text-align:center;
padding:20px;
background:#0f172a;
color:white;
}

</style>

</head>

<body>

<header class="header">
<h1>My Resume</h1>
<p>Professional Background</p>
</header>

<div class="resume-container">



<!-- PDF RESUME VIEWER -->
<div class="resume-section">

<h2>My Resume (PDF)</h2>

<iframe src="resume.pdf" class="pdf-viewer"></iframe>

<br>

<a href="resume.pdf" class="download-btn" target="_blank">
Download Resume (PDF)
</a>

</div>

</div>

<footer class="footer">
<p>© 2026 James Laag | Portfolio</p>
</footer>

</body>
</html>
